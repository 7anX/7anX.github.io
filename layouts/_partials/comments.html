{{- $giscus := site.Params.giscus -}}
{{- if and site.Params.comments $giscus.enable $giscus.repo $giscus.repoId $giscus.category $giscus.categoryId -}}
<section class="comments">
  <script>
    (function () {
      function getGiscusTheme() {
        var theme = document.body && document.body.classList.contains('dark') ? 'dark' : 'light';
        var htmlTheme = document.documentElement.getAttribute('data-theme');
        if (htmlTheme === 'dark' || htmlTheme === 'light') theme = htmlTheme;
        return theme;
      }

      function updateGiscusTheme() {
        var iframe = document.querySelector('iframe.giscus-frame');
        if (!iframe) return;
        iframe.contentWindow.postMessage({
          giscus: {
            setConfig: {
              theme: getGiscusTheme()
            }
          }
        }, 'https://giscus.app');
      }

      function loadGiscus() {
        var script = document.createElement('script');
        script.src = 'https://giscus.app/client.js';
        script.async = true;
        script.crossOrigin = 'anonymous';
        script.setAttribute('data-repo', '{{ $giscus.repo }}');
        script.setAttribute('data-repo-id', '{{ $giscus.repoId }}');
        script.setAttribute('data-category', '{{ $giscus.category }}');
        script.setAttribute('data-category-id', '{{ $giscus.categoryId }}');
        script.setAttribute('data-mapping', '{{ default "pathname" $giscus.mapping }}');
        script.setAttribute('data-strict', '{{ default "0" $giscus.strict }}');
        script.setAttribute('data-reactions-enabled', '{{ default "1" $giscus.reactionsEnabled }}');
        script.setAttribute('data-emit-metadata', '{{ default "0" $giscus.emitMetadata }}');
        script.setAttribute('data-input-position', '{{ default "bottom" $giscus.inputPosition }}');
        script.setAttribute('data-theme', getGiscusTheme());
        script.setAttribute('data-lang', '{{ default "zh-CN" $giscus.lang }}');
        // ponytail: 去掉 data-loading=lazy，由外层 IntersectionObserver 提前 600px 触发
        document.querySelector('.comments').appendChild(script);
      }

      var section = document.currentScript.parentElement;
      var io = new IntersectionObserver(function (entries) {
        if (entries[0].isIntersecting) {
          io.disconnect();
          loadGiscus();
        }
      }, { rootMargin: '0px 0px 600px 0px' });
      io.observe(section);

      var observer = new MutationObserver(updateGiscusTheme);
      observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class', 'data-theme'] });
      observer.observe(document.body, { attributes: true, attributeFilter: ['class', 'data-theme'] });
      document.addEventListener('click', function (event) {
        if (event.target.closest('#theme-toggle')) {
          window.setTimeout(updateGiscusTheme, 150);
        }
      });
    })();
  </script>
</section>
{{- end -}}
